name: validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e . pytest
      - run: python scripts/prepare_data.py
      - run: pytest -q
      - run: python scripts/run_gpr_handoff.py --quick --candidate base_cyclic_xproc_pca8_matern32

  rf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::randomForest
            any::pls
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pandas
      - run: python scripts/prepare_data.py
      - run: python scripts/run_rf_reproduction.py
      - run: python scripts/run_rf_trajectory.py --output-dir rf-trajectory-results
      - uses: actions/upload-artifact@v4
        with:
          name: rf-trajectory-results
          path: rf-trajectory-results/*.csv
          if-no-files-found: error
